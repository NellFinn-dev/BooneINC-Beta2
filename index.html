<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta charset="utf-8" />
<title>Task Dashboard</title>
<link rel="stylesheet" href="globals.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<!-- Main container -->
<main class="box">
<!-- Primary layout group -->
<section class="group" aria-label="Dashboard">
<!-- Background rectangle -->
<div class="rectangle" role="presentation"></div>
<!-- Date display -->
<div class="date" aria-label="Current date">
<div class="div" role="presentation"></div>
<time class="text-wrapper" datetime="2020-03-10">Tuesday, March 10th</time>
</div>
<!-- Decorative cat image -->
<img class="erm-actually-cat" src="img/erm-actually-cat-1.png" alt="Decorative cat illustration" />
<!-- Calendar link widget -->
<nav class="link-to-calendar" aria-label="Calendar navigation">
<div class="group-2">
<img class="img" src="img/rectangle-3.svg" alt="" role="presentation" />
<img class="rectangle-2" src="img/rectangle-4.svg" alt="" role="presentation" />
<span class="text-wrapper-2">Calendar</span>
<span class="text-wrapper-3">March</span>
</div>
<img class="line" src="img/line-1.svg" alt="" role="presentation" />
<img class="line-2" src="img/line-2.svg" alt="" role="presentation" />
<img class="line-2" src="img/line-3.svg" alt="" role="presentation" />
<img class="line-3" src="img/line-4.svg" alt="" role="presentation" />
<img class="line" src="img/line-5.svg" alt="" role="presentation" />
<img class="line-2" src="img/line-6.svg" alt="" role="presentation" />
<img class="line-4" src="img/line-7.svg" alt="" role="presentation" />
<img class="line-5" src="img/line-8.svg" alt="" role="presentation" />
<img class="line-6" src="img/line-9.svg" alt="" role="presentation" />
<img class="line-7" src="img/line-10.svg" alt="" role="presentation" />
<img class="line-8" src="img/line-11.svg" alt="" role="presentation" />
<img class="line-9" src="img/line-12.svg" alt="" role="presentation" />
</nav>
<!-- Task list page link -->
<img class="link-to-task-list" src="img/link-to-task-list-page.png" alt="Link to task list page" />
<!-- Decorative lines -->
<img class="line-10" src="img/line-13.svg" alt="" role="presentation" />
<img class="line-11" src="img/line-14.svg" alt="" role="presentation" />
<img class="line-12" src="img/line-15.svg" alt="" role="presentation" />
<img class="line-13" src="img/line-16.svg" alt="" role="presentation" />
<img class="line-14" src="img/line-17.svg" alt="" role="presentation" />
<!-- Today's task list -->
<section class="task-list-today" aria-label="Today's tasks">
<div class="group-3">
<img class="rectangle-3" src="img/rectangle-1.png" alt="" role="presentation" />
<h1 class="text-wrapper-4">Today's Tasks</h1>
<div class="frame">
<button class="text-wrapper-5" type="button" aria-label="Add a new task">Add Task +</button>
</div>
</div>
<!-- Task 1 -->
<img class="ellipse" src="img/ellipse-6.svg" alt="Task bullet" role="presentation" />
<span class="text-wrapper-6">Task 1</span>
<!-- Task 2 -->
<img class="ellipse-2" src="img/ellipse-7.svg" alt="Task bullet" role="presentation" />
<span class="text-wrapper-7">Task 2</span>
<!-- Task 3 -->
<img class="ellipse-3" src="img/ellipse-8.svg" alt="Task bullet" role="presentation" />
<span class="text-wrapper-8">Task 3</span>
</section>
</section>
</main>
</body>
</html>
